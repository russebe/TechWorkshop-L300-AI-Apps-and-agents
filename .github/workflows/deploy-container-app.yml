name: Build and Deploy to Azure Container App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image with ACR Build
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry "$ACR_NAME" \
              --image "$IMAGE_NAME:${{ github.sha }}" \
              --image "$IMAGE_NAME:latest" \
              --platform linux/amd64 \
              --file src/Dockerfile \
              src

      - name: Deploy to Azure Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" \
              --revision-suffix "r${{ github.run_number }}" \
              --set-env-vars \
                FOUNDRY_ENDPOINT="${{ vars.FOUNDRY_ENDPOINT }}" \
                gpt_endpoint="${{ vars.GPT_ENDPOINT }}" \
                embedding_endpoint="${{ vars.EMBEDDING_ENDPOINT }}" \
                phi_4_endpoint="${{ vars.PHI_4_ENDPOINT }}"
